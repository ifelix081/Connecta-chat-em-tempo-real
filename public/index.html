<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat em Tempo Real</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
    <div class="login-card">
        <h1>Entrar no Chat</h1>
        <input id="username-input" placeholder="Seu nome" maxlength="30" />
        <input id="room-input" placeholder="Nome da sala" maxlength="30" />
        <button id="join-btn">Entrar</button>
    </div>
    </div>

    <div id="chat-screen" class="hidden">
    <aside id="sidebar">
        <h3>Usuários online</h3>
        <ul id="users-list"></ul>
    </aside>
    <main id="chat-main">
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        <form id="message-form">
        <input id="message-input" placeholder="Digite uma mensagem..." autocomplete="off" />
        <button type="submit">Enviar</button>
        </form>
    </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
</body>
</html>
